<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TETRON</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/"
  }
}
</script>
<link rel="icon" type="image/svg+xml" href="./tetron.svg">
<link rel="stylesheet" href="./styles/main.css">
</head>
<body>
<div id="sidebar" class="sidebar"></div>
<div id="fps-overlay" style="display:none;">FPS <span id="fps-val">-</span></div>
<div id="target-reticle" aria-hidden="true"></div>
<div id="pause-overlay" aria-hidden="true">PAUSED</div>
<div id="game-hud" aria-label="Player status HUD">
  <div class="game-hud-row game-hud-armor">
    <span class="game-hud-icon armor-icon" aria-hidden="true"></span>
    <div class="game-hud-content">
      <div class="game-hud-line">
        <span class="game-hud-label">ARMOR</span>
        <span class="game-hud-value" data-hud-value="armor">100</span>
      </div>
      <div class="game-hud-track"><span class="game-hud-fill armor-fill" data-hud-fill="armor"></span></div>
    </div>
  </div>
  <div class="game-hud-row game-hud-health">
    <span class="game-hud-icon health-icon" aria-hidden="true"></span>
    <div class="game-hud-content">
      <div class="game-hud-line">
        <span class="game-hud-label">HEALTH</span>
        <span class="game-hud-value" data-hud-value="health">100</span>
      </div>
      <div class="game-hud-track"><span class="game-hud-fill health-fill" data-hud-fill="health"></span></div>
    </div>
    <span id="bullet-time-indicator" class="game-hud-icon bullet-time-indicator" aria-hidden="true"></span>
  </div>
</div>
<div id="ammo-hud" class="ammo-hud" aria-label="Weapon ammo HUD">
  <div class="ammo-hud-title" data-ammo-title>RIFLE</div>
  <div class="ammo-hud-line"><span data-ammo-mag-label>MAG</span><strong data-ammo-mag>30</strong></div>
  <div class="ammo-hud-line"><span>AMMO</span><strong data-ammo-reserve>180</strong></div>
</div>
<canvas id="radar-canvas" aria-label="Radar" aria-hidden="true"></canvas>
<div id="instructions">WASD Move · 3rd Person Mouse Camera · Click/Drag View to Aim · SHIFT Dash · Q Bullet Time · TAB Toggle Panel</div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
